<div class="container">
  <app-side-bar (margin)="updateMargin($event)"></app-side-bar>

  <div class="containerHorses">
    <div *ngFor="let item of arrayMarginValue; let i = index">
      <img
        class="horse"
        [ngStyle]="{ 'margin-left': item }"
        src="assets/img/horse/icons{{ i + 1 }}.png"
      />
    </div>
  </div>
</div>
